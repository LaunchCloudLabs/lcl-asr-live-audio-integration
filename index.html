<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchCloud Labs — Live ASR Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcl-navy:    #0a0e1a;
            --lcl-panel:   #0f1424;
            --lcl-border:  #1e2640;
            --lcl-blue:    #2563eb;
            --lcl-electric:#38bdf8;
            --lcl-accent:  #6366f1;
            --lcl-green:   #10b981;
            --lcl-red:     #ef4444;
            --lcl-amber:   #f59e0b;
            --lcl-white:   #f1f5f9;
            --lcl-muted:   #64748b;
            --lcl-text:    #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--lcl-navy);
            color: var(--lcl-text);
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* ── TOP BAR ────────────────────────────────── */
        .topbar {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--lcl-border);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-accent));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900; color: white;
        }
        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--lcl-white);
            letter-spacing: -0.3px;
        }
        .brand-name span { color: var(--lcl-electric); }
        .brand-sub {
            font-size: 0.7rem;
            color: var(--lcl-muted);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .hub-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--lcl-panel);
            border: 1px solid var(--lcl-border);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--lcl-muted);
        }
        .status-light {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--lcl-border);
            flex-shrink: 0;
        }
        .status-light.active {
            background: var(--lcl-green);
            box-shadow: 0 0 8px var(--lcl-green);
        }
        .status-light.reconnecting {
            background: var(--lcl-amber);
            box-shadow: 0 0 8px var(--lcl-amber);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* ── MAIN LAYOUT ──────────────────────────── */
        .console {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1rem;
        }

        /* ── PANEL ─────────────────────────────────── */
        .panel {
            background: var(--lcl-panel);
            border: 1px solid var(--lcl-border);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .panel-title {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--lcl-muted);
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--lcl-border);
        }

        /* ── BUTTON ─────────────────────────────────── */
        button#init-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 1rem;
        }
        button#init-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        button#init-btn:active { transform: translateY(0); }

        /* ── VU METER ─────────────────────────────── */
        .vu-wrap {
            margin-bottom: 0.75rem;
        }
        .vu-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--lcl-muted);
            margin-bottom: 6px;
        }
        #vu-meter {
            width: 100%;
            height: 8px;
            background: var(--lcl-border);
            border-radius: 4px;
            overflow: hidden;
        }
        #vu-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--lcl-blue), var(--lcl-electric));
            transition: width 0.08s linear;
        }
        #stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--lcl-muted);
            line-height: 1.8;
            margin-top: 0.75rem;
        }

        /* ── TRANSCRIPT ──────────────────────────── */
        #transcript {
            height: 480px;
            overflow-y: auto;
            background: var(--lcl-navy);
            border-radius: 8px;
            border: 1px solid var(--lcl-border);
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            scrollbar-width: thin;
            scrollbar-color: var(--lcl-border) transparent;
        }
        #transcript::-webkit-scrollbar { width: 4px; }
        #transcript::-webkit-scrollbar-thumb { background: var(--lcl-border); border-radius: 2px; }

        .seg {
            margin-bottom: 0.6rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            border-left: 3px solid var(--lcl-blue);
            background: rgba(37,99,235,0.06);
            animation: fadein 0.25s ease;
        }
        .seg.sys {
            color: var(--lcl-muted);
            background: transparent;
            border-left-color: var(--lcl-border);
            font-size: 0.72rem;
        }
        .seg.err {
            color: var(--lcl-red);
            background: rgba(239,68,68,0.07);
            border-left-color: var(--lcl-red);
        }
        .seg.transcript {
            border-left-color: var(--lcl-electric);
            background: rgba(56,189,248,0.05);
        }
        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* ── TRANSCRIPT HEADER ────────────────────── */
        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .badge {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(99,102,241,0.15);
            color: var(--lcl-accent);
            border: 1px solid rgba(99,102,241,0.25);
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <div class="brand-logo">LC</div>
            <div>
                <div class="brand-name">LaunchCloud <span>Labs</span></div>
                <div class="brand-sub">Live ASR Studio</div>
            </div>
        </div>
        <div class="hub-status">
            <span id="led" class="status-light"></span>
            HUB &nbsp;·&nbsp; <span id="status">OFFLINE</span>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="console">
        <!-- LEFT: controls -->
        <div class="panel">
            <div class="panel-title">Audio Engine</div>
            <button id="init-btn" onclick="startAudio()">▶ &nbsp;Activate Audio</button>

            <div class="vu-wrap">
                <div class="vu-label">Input Level</div>
                <div id="vu-meter"><div id="vu-bar"></div></div>
            </div>
            <div id="stats">AUDIO: 16KHZ PCM<br>PACKETS: 0<br>PEAK: —</div>
        </div>

        <!-- RIGHT: transcript -->
        <div class="panel">
            <div class="transcript-header">
                <div class="panel-title" style="margin-bottom:0;border:none;padding:0">Live Transcript</div>
                <span class="badge">Whisper · Diarization ON</span>
            </div>
            <div id="transcript"><div class="seg sys">Waiting for hub sync...</div></div>
        </div>
    </div>

    <script>
        let audioCtx, gainNode, isLive = false, socket = null;
        let nextPlayTime = 0, packetCount = 0, reconnectDelay = 1000;
        const transcript = document.getElementById('transcript');
        const statusEl = document.getElementById('status');
        const led = document.getElementById('led');
        const vu = document.getElementById('vu-bar');
        const stats = document.getElementById('stats');

        function log(text, cls = 'seg', rawHtml = false) {
            const div = document.createElement('div');
            div.className = cls;
            if (rawHtml) div.innerHTML = text;
            else div.innerText = text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function getWsUrl() {
            return 'wss://launchcloud.duckdns.org:8765';
        }

        function connect() {
            if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;

            const wsUrl = getWsUrl();
            statusEl.innerText = 'CONNECTING...';
            led.className = 'status-light reconnecting';
            log('Connecting to ' + wsUrl + '...', 'seg sys');

            socket = new WebSocket(wsUrl);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                statusEl.innerText = 'ONLINE';
                led.className = 'status-light active';
                reconnectDelay = 1000;
                socket.send(JSON.stringify({type: 'register_web'}));
                log('Hub synced. Speak.', 'seg sys');
            };

            socket.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    packetCount++;
                    const int16 = new Int16Array(e.data);
                    let maxVal = 0;
                    for (let i = 0; i < int16.length; i++) {
                        const v = Math.abs(int16[i]) / 32768.0;
                        if (v > maxVal) maxVal = v;
                    }
                    vu.style.width = Math.min(maxVal * 300, 100) + '%';
                    stats.innerHTML = 'AUDIO: 16KHZ PCM<br>PACKETS: ' + packetCount + '<br>PEAK: ' + (maxVal * 100).toFixed(1) + '%';

                    if (!isLive || !audioCtx) return;

                    // Resume context if suspended (browser policy enforcement)
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                        return;
                    }

                    const float32 = new Float32Array(int16.length);
                    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

                    const buffer = audioCtx.createBuffer(1, float32.length, 16000);
                    buffer.getChannelData(0).set(float32);
                    const src = audioCtx.createBufferSource();
                    src.buffer = buffer;
                    src.connect(gainNode);

                    const now = audioCtx.currentTime;
                    // Cap lookahead to 0.3s to avoid massive scheduling drift
                    if (nextPlayTime < now || nextPlayTime > now + 0.3) nextPlayTime = now + 0.05;
                    src.start(nextPlayTime);
                    if (packetCount % 20 === 0) console.log('[AUDIO] ctx=' + audioCtx.state + ' peak=' + (maxVal*100).toFixed(2) + '% npt=' + nextPlayTime.toFixed(2));
                    nextPlayTime += buffer.duration;
                } else {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.type === 'transcript') {
                            const speaker = data.speaker || 'Speaker 1';
                            const color   = data.color   || '#00ff41';
                            const line    = `<span style="color:${color};font-weight:bold">[${speaker}]</span> ${data.text}`;
                            log(line, 'seg transcript', true);
                        }
                    } catch (err) { /* ignore non-JSON */ }
                }
            };

            socket.onclose = () => {
                statusEl.innerText = 'DISCONNECTED';
                led.className = 'status-light';
                log('Hub disconnected. Reconnecting in ' + (reconnectDelay/1000) + 's...', 'seg err');
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
            };

            socket.onerror = () => {
                log('WebSocket error', 'seg err');
            };
        }

        async function startAudio() {
            if (isLive) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 10.0;  // server already applies 15x; 10x here = 150x total
            gainNode.connect(audioCtx.destination);
            nextPlayTime = 0;
            isLive = true;
            // Must call resume() in the user-gesture handler
            try {
                await audioCtx.resume();
            } catch(e) { console.warn('[AUDIO] resume failed:', e); }
            console.log('[AUDIO] Context state:', audioCtx.state);
            document.getElementById('init-btn').innerText = 'AUDIO ENGINE READY (ctx=' + audioCtx.state + ')';
        }

        connect();
    </script>
</body>
</html>
