<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchCloud Labs — Live ASR Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lcl-navy:    #0a0e1a;
            --lcl-panel:   #0f1424;
            --lcl-border:  #1e2640;
            --lcl-blue:    #2563eb;
            --lcl-electric:#38bdf8;
            --lcl-accent:  #6366f1;
            --lcl-green:   #10b981;
            --lcl-red:     #ef4444;
            --lcl-amber:   #f59e0b;
            --lcl-white:   #f1f5f9;
            --lcl-muted:   #64748b;
            --lcl-text:    #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--lcl-navy);
            color: var(--lcl-text);
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* ── TOP BAR ────────────────────────────────── */
        .topbar {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--lcl-border);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-accent));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900; color: white;
        }
        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--lcl-white);
            letter-spacing: -0.3px;
        }
        .brand-name span { color: var(--lcl-electric); }
        .brand-sub {
            font-size: 0.7rem;
            color: var(--lcl-muted);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .hub-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--lcl-panel);
            border: 1px solid var(--lcl-border);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--lcl-muted);
        }
        .status-light {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--lcl-border);
            flex-shrink: 0;
        }
        .status-light.active {
            background: var(--lcl-green);
            box-shadow: 0 0 8px var(--lcl-green);
        }
        .status-light.reconnecting {
            background: var(--lcl-amber);
            box-shadow: 0 0 8px var(--lcl-amber);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* ── MAIN LAYOUT ──────────────────────────── */
        .console {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1rem;
        }

        /* ── PANEL ─────────────────────────────────── */
        .panel {
            background: var(--lcl-panel);
            border: 1px solid var(--lcl-border);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .panel-title {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--lcl-muted);
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--lcl-border);
        }

        /* ── BUTTON ─────────────────────────────────── */
        button#init-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 1rem;
        }
        button#init-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        button#init-btn:active { transform: translateY(0); }

        /* ── VU METER ─────────────────────────────── */
        .vu-wrap {
            margin-bottom: 0.75rem;
        }
        .vu-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--lcl-muted);
            margin-bottom: 6px;
        }
        #vu-meter {
            width: 100%;
            height: 8px;
            background: var(--lcl-border);
            border-radius: 4px;
            overflow: hidden;
        }
        #vu-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--lcl-blue), var(--lcl-electric));
            transition: width 0.08s linear;
        }
        #stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            color: var(--lcl-muted);
            line-height: 1.8;
            margin-top: 0.75rem;
        }

        /* ── TRANSCRIPT ──────────────────────────── */
        #transcript {
            height: 480px;
            overflow-y: auto;
            background: var(--lcl-navy);
            border-radius: 8px;
            border: 1px solid var(--lcl-border);
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            scrollbar-width: thin;
            scrollbar-color: var(--lcl-border) transparent;
        }
        #transcript::-webkit-scrollbar { width: 4px; }
        #transcript::-webkit-scrollbar-thumb { background: var(--lcl-border); border-radius: 2px; }

        .seg {
            margin-bottom: 0.6rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            border-left: 3px solid var(--lcl-blue);
            background: rgba(37,99,235,0.06);
            animation: fadein 0.25s ease;
        }
        .seg.sys {
            color: var(--lcl-muted);
            background: transparent;
            border-left-color: var(--lcl-border);
            font-size: 0.72rem;
        }
        .seg.err {
            color: var(--lcl-red);
            background: rgba(239,68,68,0.07);
            border-left-color: var(--lcl-red);
        }
        .seg.transcript {
            border-left-color: var(--lcl-electric);
            background: rgba(56,189,248,0.05);
        }
        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* ── PHONE BRIDGE PANEL ──────────────────── */
        .bridge-row {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .bridge-field label {
            display: block;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--lcl-muted);
            margin-bottom: 4px;
        }
        .bridge-field input[type="text"] {
            width: 100%;
            background: var(--lcl-navy);
            border: 1px solid var(--lcl-border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--lcl-white);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .bridge-field input[type="text"]:focus {
            border-color: var(--lcl-electric);
        }
        .bridge-field input[type="text"][readonly] {
            color: var(--lcl-muted);
            cursor: default;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .toggle-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--lcl-text);
        }
        .toggle {
            position: relative;
            width: 38px; height: 20px;
        }
        .toggle input { display: none; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--lcl-border);
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            left: 3px; top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--lcl-green); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

        button.save-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--lcl-green), #059669);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.4rem;
        }
        button.save-btn:hover { opacity: 0.88; }
        #bridge-status {
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--lcl-muted);
            min-height: 16px;
            margin-top: 4px;
            text-align: center;
        }
        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .badge {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(99,102,241,0.15);
            color: var(--lcl-accent);
            border: 1px solid rgba(99,102,241,0.25);
        }
        /* ── AI CHAT MODE PANEL ──────────────────────────── */
        .model-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.4rem;
        }
        .model-btn {
            padding: 5px 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid var(--lcl-border);
            border-radius: 6px;
            background: var(--lcl-navy);
            color: var(--lcl-muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .model-btn:hover {
            border-color: var(--lcl-electric);
            color: var(--lcl-electric);
        }
        .model-btn.active {
            background: linear-gradient(135deg, var(--lcl-blue), var(--lcl-accent));
            border-color: transparent;
            color: white;
        }
        .ai-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0.75rem 0 0.5rem;
            padding: 6px 10px;
            background: var(--lcl-navy);
            border-radius: 6px;
            border: 1px solid var(--lcl-border);
        }
        #ai-status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--lcl-border);
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #ai-status-dot.listening { background: var(--lcl-green); box-shadow: 0 0 8px var(--lcl-green); }
        #ai-status-dot.thinking  { background: var(--lcl-amber); box-shadow: 0 0 8px var(--lcl-amber); animation: pulse 0.8s infinite; }
        #ai-status-dot.speaking  { background: var(--lcl-electric); box-shadow: 0 0 8px var(--lcl-electric); animation: pulse 0.5s infinite; }
        #ai-status-text { font-size: 0.7rem; font-weight: 600; color: var(--lcl-muted); }

        /* AI chat messages in transcript panel */
        .seg.ai-user {
            border-left-color: var(--lcl-amber);
            background: rgba(245,158,11,0.06);
        }
        .seg.ai-assistant {
            border-left-color: var(--lcl-accent);
            background: rgba(99,102,241,0.07);
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <div class="brand-logo">LC</div>
            <div>
                <div class="brand-name">LaunchCloud <span>Labs</span></div>
                <div class="brand-sub">Live ASR Studio</div>
            </div>
        </div>
        <div class="hub-status">
            <span id="led" class="status-light"></span>
            HUB &nbsp;·&nbsp; <span id="status">OFFLINE</span>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="console">
        <!-- LEFT: controls -->
        <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="panel">
            <div class="panel-title">Audio Engine</div>
            <button id="init-btn" onclick="startAudio()">▶ &nbsp;Activate Audio</button>

            <div class="vu-wrap">
                <div class="vu-label">Input Level</div>
                <div id="vu-meter"><div id="vu-bar"></div></div>
            </div>
            <div id="stats">AUDIO: 16KHZ PCM<br>PACKETS: 0<br>PEAK: —</div>
        </div>

        <!-- Phone Bridge Config Panel -->
        <div class="panel">
            <div class="panel-title">Phone Bridge</div>
            <div class="bridge-row">
                <div class="bridge-field">
                    <label>Telnyx Number</label>
                    <input type="text" id="telnyx-num" readonly value="+13212189801">
                </div>
                <div class="bridge-field">
                    <label>Authorized Caller (Boss)</label>
                    <input type="text" id="boss-num" placeholder="+1XXXXXXXXXX" value="+16037777815">
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Bridge Active</span>
                    <label class="toggle">
                        <input type="checkbox" id="bridge-active" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="save-btn" onclick="saveConfig()">💾 &nbsp;Save Config</button>
                <div id="bridge-status"></div>
            </div>
        </div>
        <!-- AI Chat Mode Panel -->
        <div class="panel">
            <div class="panel-title">AI Chat Mode</div>
            <div class="toggle-row">
                <span class="toggle-label">AI Chat Active</span>
                <label class="toggle">
                    <input type="checkbox" id="ai-mode-toggle" onchange="toggleAiMode()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div style="margin-top:0.75rem;">
                <div class="vu-label">AI Model</div>
                <div class="model-btns" id="model-btns">
                    <button class="model-btn active" data-model="deepseek" onclick="selectModel('deepseek')">DeepSeek</button>
                    <button class="model-btn" data-model="claude"    onclick="selectModel('claude')">Claude</button>
                    <button class="model-btn" data-model="openai"    onclick="selectModel('openai')">GPT-4o</button>
                    <button class="model-btn" data-model="grok"      onclick="selectModel('grok')">Grok</button>
                    <button class="model-btn" data-model="gemini"    onclick="selectModel('gemini')">Gemini</button>
                </div>
            </div>
            <div class="ai-status-bar">
                <div id="ai-status-dot"></div>
                <span id="ai-status-text">Idle — call +1 (321) 218-9801</span>
            </div>
            <button class="save-btn" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);margin-top:0.4rem;" onclick="clearAiHistory()">🗑 &nbsp;Clear Conversation</button>
            <div id="ai-clear-status" style="font-size:0.65rem;font-family:'JetBrains Mono',monospace;color:var(--lcl-muted);min-height:14px;margin-top:4px;text-align:center;"></div>
        </div>
        </div>

        <!-- RIGHT: transcript -->
        <div class="panel">
            <div class="transcript-header">
                <div class="panel-title" style="margin-bottom:0;border:none;padding:0">Live Transcript</div>
                <span class="badge" id="mode-badge">Nova-3 · Diarization ON</span>
            </div>
            <div id="transcript"><div class="seg sys">Waiting for hub sync...</div></div>
        </div>
    </div>

    <script>
        let audioCtx, gainNode, isLive = false, socket = null;
        let nextPlayTime = 0, packetCount = 0, reconnectDelay = 1000;
        const transcript = document.getElementById('transcript');
        const statusEl = document.getElementById('status');
        const led = document.getElementById('led');
        const vu = document.getElementById('vu-bar');
        const stats = document.getElementById('stats');

        function log(text, cls = 'seg', rawHtml = false) {
            const div = document.createElement('div');
            div.className = cls;
            if (rawHtml) div.innerHTML = text;
            else div.innerText = text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function getWsUrl() {
            return 'wss://launchcloud.duckdns.org:8765';
        }

        function connect() {
            if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;

            const wsUrl = getWsUrl();
            statusEl.innerText = 'CONNECTING...';
            led.className = 'status-light reconnecting';
            log('Connecting to ' + wsUrl + '...', 'seg sys');

            socket = new WebSocket(wsUrl);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                statusEl.innerText = 'ONLINE';
                led.className = 'status-light active';
                reconnectDelay = 1000;
                socket.send(JSON.stringify({type: 'register_web'}));
                log('Hub synced. Speak.', 'seg sys');
            };

            socket.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    packetCount++;
                    const int16 = new Int16Array(e.data);
                    let maxVal = 0;
                    for (let i = 0; i < int16.length; i++) {
                        const v = Math.abs(int16[i]) / 32768.0;
                        if (v > maxVal) maxVal = v;
                    }
                    vu.style.width = Math.min(maxVal * 300, 100) + '%';
                    stats.innerHTML = 'AUDIO: 16KHZ PCM<br>PACKETS: ' + packetCount + '<br>PEAK: ' + (maxVal * 100).toFixed(1) + '%';

                    if (!isLive || !audioCtx) return;

                    // Resume context if suspended (browser policy enforcement)
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                        return;
                    }

                    const float32 = new Float32Array(int16.length);
                    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

                    const buffer = audioCtx.createBuffer(1, float32.length, 16000);
                    buffer.getChannelData(0).set(float32);
                    const src = audioCtx.createBufferSource();
                    src.buffer = buffer;
                    src.connect(gainNode);

                    const now = audioCtx.currentTime;
                    // Cap lookahead to 0.3s to avoid massive scheduling drift
                    if (nextPlayTime < now || nextPlayTime > now + 0.3) nextPlayTime = now + 0.05;
                    src.start(nextPlayTime);
                    if (packetCount % 20 === 0) console.log('[AUDIO] ctx=' + audioCtx.state + ' peak=' + (maxVal*100).toFixed(2) + '% npt=' + nextPlayTime.toFixed(2));
                    nextPlayTime += buffer.duration;
                } else {
                    try {
                        const data = JSON.parse(e.data);
                        if (data.type === 'ai_mode_status') {
                            applyAiModeStatus(data.enabled, data.model);
                        } else if (data.type === 'ai_chat') {
                            addAiChatMessage(data.role, data.text);
                        } else if (data.type === 'ai_status') {
                            setAiStatus(data.status, data.caller);
                        } else if (data.type === 'transcript') {
                            const speaker = data.speaker || 'Speaker 1';
                            const color   = data.color   || '#00ff41';
                            const line    = `<span style="color:${color};font-weight:bold">[${speaker}]</span> ${data.text}`;
                            log(line, 'seg transcript', true);
                        } else if (data.type === 'config_status') {
                            const el = document.getElementById('bridge-status');
                            if (data.ok) {
                                el.style.color = 'var(--lcl-green)';
                                el.innerText = '✓ Config saved';
                            } else {
                                el.style.color = 'var(--lcl-red)';
                                el.innerText = '✗ Save failed';
                            }
                        }
                    } catch (err) { /* ignore non-JSON */ }
                }
            };

            socket.onclose = () => {
                statusEl.innerText = 'DISCONNECTED';
                led.className = 'status-light';
                log('Hub disconnected. Reconnecting in ' + (reconnectDelay/1000) + 's...', 'seg err');
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
            };

            socket.onerror = () => {
                log('WebSocket error', 'seg err');
            };
        }

        function saveConfig() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                document.getElementById('bridge-status').style.color = 'var(--lcl-red)';
                document.getElementById('bridge-status').innerText = '✗ Not connected to hub';
                return;
            }
            const cfg = {
                authorized_number: document.getElementById('boss-num').value.trim(),
                telnyx_number:     document.getElementById('telnyx-num').value.trim(),
                bridge_active:     document.getElementById('bridge-active').checked
            };
            socket.send(JSON.stringify({ type: 'update_config', config: cfg }));
            document.getElementById('bridge-status').style.color = 'var(--lcl-muted)';
            document.getElementById('bridge-status').innerText = 'Saving...';
        }

        async function startAudio() {
            if (isLive) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 10.0;  // server already applies 15x; 10x here = 150x total
            gainNode.connect(audioCtx.destination);
            nextPlayTime = 0;
            isLive = true;
            // Must call resume() in the user-gesture handler
            try {
                await audioCtx.resume();
            } catch(e) { console.warn('[AUDIO] resume failed:', e); }
            console.log('[AUDIO] Context state:', audioCtx.state);
            document.getElementById('init-btn').innerText = 'AUDIO ENGINE READY (ctx=' + audioCtx.state + ')';
        }

        // ── AI Chat Mode ─────────────────────────────────
        let currentAiModel = 'deepseek';

        function toggleAiMode() {
            const enabled = document.getElementById('ai-mode-toggle').checked;
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                document.getElementById('ai-mode-toggle').checked = !enabled;
                return;
            }
            socket.send(JSON.stringify({ type: 'set_ai_mode', enabled }));
        }

        function selectModel(model) {
            currentAiModel = model;
            document.querySelectorAll('.model-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.model === model);
            });
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'set_ai_model', model }));
            }
        }

        function clearAiHistory() {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            socket.send(JSON.stringify({ type: 'clear_ai_history' }));
            const el = document.getElementById('ai-clear-status');
            el.style.color = 'var(--lcl-green)';
            el.innerText = '✓ History cleared';
            setTimeout(() => { el.innerText = ''; }, 2000);
        }

        function setAiStatus(status, caller) {
            const dot  = document.getElementById('ai-status-dot');
            const text = document.getElementById('ai-status-text');
            dot.className = '';
            const labels = {
                idle:      'Idle — call +1 (321) 218-9801',
                listening: `Listening… (${caller || 'caller'})`,
                thinking:  'Thinking…',
                speaking:  'Speaking…',
            };
            if (status !== 'idle') {
                dot.classList.add(status);
            }
            text.innerText = labels[status] || status;
        }

        function applyAiModeStatus(enabled, model) {
            document.getElementById('ai-mode-toggle').checked = enabled;
            const badge = document.getElementById('mode-badge');
            if (enabled) {
                badge.style.background   = 'rgba(99,102,241,0.2)';
                badge.style.borderColor  = 'rgba(99,102,241,0.4)';
                badge.style.color        = '#a5b4fc';
                badge.innerText          = 'AI Chat · ' + model.toUpperCase();
            } else {
                badge.style.background  = '';
                badge.style.borderColor = '';
                badge.style.color       = '';
                badge.innerText         = 'Nova-3 · Diarization ON';
            }
            if (model) selectModel(model);
        }

        function addAiChatMessage(role, text) {
            const cls = role === 'user' ? 'seg ai-user' : 'seg ai-assistant';
            const label = role === 'user' ? '📞 Caller' : '🤖 AI';
            const color = role === 'user' ? 'var(--lcl-amber)' : 'var(--lcl-accent)';
            const line  = `<span style="color:${color};font-weight:bold">[${label}]</span> ${text}`;
            log(line, cls, true);
        }

        connect();
    </script>
</body>
</html>
